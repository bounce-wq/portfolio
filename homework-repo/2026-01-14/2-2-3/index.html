<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2-2-3</title>
  </head>
  <body>
    <script>
      "use strict";

      function rollDice() {
        return Math.floor(Math.random() * 6) + 1;
      }

      function getScore(a, b) {
        return Math.abs(a - b);
      }

      const d1 = rollDice();
      const d2 = rollDice();

      console.log(d1, d2, getScore(d1, d2));
    </script>
  </body>
</html>
