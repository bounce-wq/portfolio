<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2-1-1</title>
  </head>
  <body>
    <script>
      "use strict";
      function sum(n) {
        let total = 0;
        for (let i = 1; i <= n; i++) {
          total += i;
        }
        return total;
      }

      function sumEven(n) {
        let total = 0;
        for (let i = 2; i <= n; i += 2) {
          total += i;
        }
        return total;
      }
    </script>
  </body>
</html>
